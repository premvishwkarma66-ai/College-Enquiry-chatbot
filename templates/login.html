<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Login</title>
        <style>
            body {
                background-color: #f1f5f9;
                font-family: Arial, sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }
            .login-box h2 {
                margin-top: 20px;
            }

            .login-box input {
                width: 100%;
                padding: 10px;
                margin-bottom: 12px;
                border-radius: 4px;
                border: 1px solid #ccc;
            }
            .login-box button {
                width: 100%;
                padding: 10px;
                background: #2563eb;
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
            }
            .error {
                color: red;
                margin-bottom: 10px;
            }
        </style>
    </head>
<body>
    <div class="login-box">
        <h2>Loginn</h2>
        {% if error %}
           <div class="error">{{error}}</div>
        {% endif %}
        
        <form method="post">
            <input name="email" placeholder="Email" required>
            <input name="password" type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>  
</html>
